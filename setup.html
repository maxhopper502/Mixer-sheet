<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Mixer Setup</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="app-header">
  <h1>✈️ Mixer Sheet</h1>
  <p>Job Setup</p>
</div>

<div class="container">

  <!-- Copy from existing job (shown when ?copyClient= is in URL) -->
  <div class="card" id="copy-banner" style="display:none;border-color:#6c5ce7">
    <div class="card-title">🔗 Adding Aircraft to Existing Job</div>
    <p style="font-size:0.85rem;color:var(--muted)">Client and order details have been pre-filled. Just enter the new aircraft registration and pilot, then add products.</p>
  </div>

  <div class="card">
    <div class="card-title">📋 Job Details</div>

    <form id="job-form">
      <div class="form-row">
        <div class="form-group">
          <label>Client</label>
          <input type="text" name="client" required placeholder="Client name" />
        </div>
        <div class="form-group">
          <label>Crop</label>
          <input type="text" name="crop" placeholder="Wheat, Canola…" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Pilot</label>
          <input type="text" name="pilot" placeholder="Pilot name" />
        </div>
        <div class="form-group">
          <label>Aircraft Reg.</label>
          <input type="text" name="aircraft" placeholder="VH-ODX" required />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Total Hectares</label>
          <input type="number" name="hectares" inputmode="decimal" placeholder="0" required />
        </div>
        <div class="form-group">
          <label>Vol / Ha (L)</label>
          <input type="number" name="volPerHa" inputmode="decimal" placeholder="0" required />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Number of Loads</label>
          <input type="number" name="loads" inputmode="numeric" placeholder="0" required />
        </div>
        <div class="form-group">
          <label>Order Number</label>
          <input type="text" name="orderNumber" placeholder="Optional" />
        </div>
      </div>
    </form>
  </div>

  <!-- Add product -->
  <div class="card">
    <div class="card-title">🧪 Add Product</div>

    <form id="product-form">
      <div class="checkbox-row">
        <input type="checkbox" id="useAll" onchange="autoCalcRate()" />
        <label for="useAll">Auto-calculate rate from supplied quantity</label>
      </div>

      <div class="form-group">
        <label>Product Name</label>
        <input type="text" name="name" required placeholder="e.g. Glyphosate" />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Rate per Ha</label>
          <input type="number" id="rateField" name="rate" inputmode="decimal" placeholder="0" step="any" required />
        </div>
        <div class="form-group">
          <label>Unit</label>
          <select name="unit">
            <option value="Litres">Litres</option>
            <option value="Kilograms">Kilograms</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Container Size 1</label>
          <input type="number" name="container1" inputmode="decimal" placeholder="e.g. 20" step="any" />
        </div>
        <div class="form-group">
          <label>Count</label>
          <input type="number" name="count1" inputmode="numeric" placeholder="0" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Container Size 2</label>
          <input type="number" name="container2" inputmode="decimal" placeholder="e.g. 5" step="any" />
        </div>
        <div class="form-group">
          <label>Count</label>
          <input type="number" name="count2" inputmode="numeric" placeholder="0" />
        </div>
      </div>

      <p id="autoRate" style="font-size:0.8rem;color:var(--green);min-height:18px;margin-bottom:8px"></p>

      <button type="submit" class="btn btn-blue btn-block">🧪 Add Product</button>
    </form>
  </div>

  <!-- Products added -->
  <div class="card">
    <div class="card-title">📦 Products Added</div>
    <div id="product-list">
      <div class="empty-state" style="padding:16px 0">
        <p>No products added yet.</p>
      </div>
    </div>
  </div>

  <button onclick="startJob()" class="btn btn-green btn-block" style="font-size:1.05rem;padding:14px">▶️ Start Mixing</button>
  <br/>
  <a href="index.html" class="btn btn-ghost btn-block">← Back to Home</a>

</div>

<div class="app-footer">Mixer Sheet v3.0</div>
<script src="setup.js"></script>
</body>
</html>
