<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mixer Setup</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Mixer Job Setup</h1>
    </div>

    <!-- Job Details Card -->
    <div class="card">
      <div class="card-title">
        <span class="icon purple">📋</span>
        Job Details
      </div>

      <div class="import-section" style="margin-bottom: 20px;">
        <input type="file" id="importFile" accept=".json">
        <p class="import-hint">Import existing job (JSON)</p>
      </div>

      <form id="job-form">
        <div class="form-grid">
          <div class="form-group">
            <label>Client</label>
            <input type="text" name="client" placeholder="Enter client name">
          </div>
          <div class="form-group">
            <label>Crop</label>
            <input type="text" name="crop" placeholder="Enter crop type">
          </div>
          <div class="form-group">
            <label>Pilot</label>
            <input type="text" name="pilot" placeholder="Enter pilot name">
          </div>
          <div class="form-group">
            <label>Aircraft</label>
            <input type="text" name="aircraft" placeholder="Aircraft ID">
          </div>
          <div class="form-group">
            <label>Hectares</label>
            <input type="number" name="hectares" step="any" placeholder="Total hectares">
          </div>
          <div class="form-group">
            <label>Vol/Ha</label>
            <input type="number" name="volPerHa" step="any" placeholder="Volume per hectare">
          </div>
          <div class="form-group">
            <label>Loads</label>
            <input type="number" name="loads" placeholder="Number of loads">
          </div>
          <div class="form-group">
            <label>Order Number</label>
            <input type="text" name="orderNumber" placeholder="Order #">
          </div>
        </div>
      </form>
    </div>

    <hr>

    <!-- Add Product Card -->
    <div class="card">
      <div class="card-title">
        <span class="icon orange">🧪</span>
        Add Product
      </div>

      <form id="product-form">
        <div class="checkbox-wrapper">
          <input type="checkbox" id="useAll" onchange="autoCalcRate()">
          <label for="useAll">Use all supplied quantity</label>
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label>Product Name</label>
            <input type="text" name="name" placeholder="Enter product name" required>
          </div>
          <div class="form-group">
            <label>Rate per Ha</label>
            <input type="number" name="rate" id="rateField" step="any" placeholder="Rate" required>
          </div>
          <div class="form-group">
            <label>Unit</label>
            <div class="unit-toggle">
              <input type="radio" name="unit" value="Litres" id="unit-litres" checked>
              <label for="unit-litres">Litres</label>
              <input type="radio" name="unit" value="Kilograms" id="unit-kg">
              <label for="unit-kg">Kilograms</label>
            </div>
          </div>
        </div>

        <div class="form-grid" style="margin-top: 15px;">
          <div class="container-row">
            <div class="form-group">
              <label>Container Size 1</label>
              <input type="number" name="container1" step="any" placeholder="Size">
            </div>
            <div class="form-group">
              <label>Count</label>
              <input type="number" name="count1" placeholder="Qty">
            </div>
          </div>
          <div class="container-row">
            <div class="form-group">
              <label>Container Size 2</label>
              <input type="number" name="container2" step="any" placeholder="Size">
            </div>
            <div class="form-group">
              <label>Count</label>
              <input type="number" name="count2" placeholder="Qty">
            </div>
          </div>
        </div>

        <span id="autoRate"></span>

        <div class="button-group">
          <button type="submit" class="btn btn-primary">🧪 Add Product</button>
        </div>
      </form>
    </div>

    <!-- Product List Card -->
    <div class="card">
      <div class="card-title">
        <span class="icon green">📦</span>
        Products Added
      </div>
      <div id="product-list"></div>
    </div>

    <!-- Start Mixing Button -->
    <div class="button-group centered" style="margin-top: 30px;">
      <button type="button" class="btn btn-success" onclick="startJob()" style="font-size: 1.2rem; padding: 18px 40px;">
        ▶️ Start Mixing
      </button>
    </div>

    <div class="nav-link">
      <a href="index.html">← Back to Home</a>
    </div>
  </div>

  <script src="setup.js"></script>
</body>
</html>
