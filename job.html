<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Mixer Job</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
<div class="app-header">
  <h1>✈️ Mixer Sheet</h1>
  <p id="header-sub">Active Job</p>
</div>
<div class="container">
  <div id="switch-bar" class="switch-bar" style="display:none">
    <span class="switch-bar-label">✈️ Switch Aircraft:</span>
    <div class="switch-pills" id="switch-pills"></div>
  </div>
  <div class="card">
    <div class="card-title">📋 Job Summary</div>
    <div class="summary-grid">
      <div class="summary-item"><div class="s-label">Client</div><div class="s-value" id="client">—</div></div>
      <div class="summary-item"><div class="s-label">Aircraft</div><div class="s-value" id="aircraft">—</div></div>
      <div class="summary-item"><div class="s-label">Pilot</div><div class="s-value" id="pilot">—</div></div>
      <div class="summary-item"><div class="s-label">Crop</div><div class="s-value" id="crop">—</div></div>
      <div class="summary-item"><div class="s-label">Total Area</div><div class="s-value"><span id="hectares">—</span> ha</div></div>
      <div class="summary-item"><div class="s-label">Vol / Ha</div><div class="s-value"><span id="volPerHa">—</span> L</div></div>
      <div class="summary-item"><div class="s-label">Load Area</div><div class="s-value"><span id="loadArea">—</span> ha</div></div>
      <div class="summary-item"><div class="s-label">Load Volume</div><div class="s-value"><span id="loadVolume">—</span> L</div></div>
      <div class="summary-item"><div class="s-label">Total Volume</div><div class="s-value"><span id="totalVolume">—</span> L</div></div>
      <div class="summary-item"><div class="s-label">Loads</div><div class="s-value" id="loads">—</div></div>
    </div>
    <div style="margin-top:12px">
      <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>
      <div class="progress-label" id="progress-label">0 of 0 loads complete</div>
    </div>
  </div>
  <!-- Load blocks + stock summary injected here by job.js -->
  <div id="products"></div>
  <div class="card">
    <div class="card-title">⚙️ Actions</div>
    <div class="btn-group">
      <button class="btn btn-ghost btn-sm" onclick="editJob()">✏️ Edit Job</button>
      <button class="btn btn-blue btn-sm" onclick="exportJob()">📤 Export PDF</button>
      <button class="btn btn-red btn-sm" onclick="deleteJob()">🗑️ Delete Job</button>
    </div>
    <a href="index.html" class="btn btn-ghost btn-block" style="margin-top:10px">← Back to Home</a>
  </div>
</div>
<div class="app-footer">Mixer Sheet v3.1</div>
<script src="job.js"></script>
</body>
</html>
