<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mixer Job</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Mixer Job</h1>
    </div>

    <!-- Job Summary Card -->
    <div class="card job-summary-card">
      <div class="job-summary-grid">
        <div class="summary-item">
          <span class="summary-label">Client</span>
          <span class="summary-value" id="client">—</span>
        </div>
        <div class="summary-item">
          <span class="summary-label">Aircraft</span>
          <span class="summary-value highlight" id="aircraft">—</span>
        </div>
        <div class="summary-item">
          <span class="summary-label">Pilot</span>
          <span class="summary-value" id="pilot">—</span>
        </div>
        <div class="summary-item">
          <span class="summary-label">Crop</span>
          <span class="summary-value" id="crop">—</span>
        </div>
        <div class="summary-item">
          <span class="summary-label">Total Area</span>
          <span class="summary-value"><span id="hectares">—</span> ha</span>
        </div>
        <div class="summary-item">
          <span class="summary-label">Vol/Ha</span>
          <span class="summary-value"><span id="volPerHa">—</span> L</span>
        </div>
      </div>

      <hr>

      <div class="job-summary-grid">
        <div class="summary-item accent">
          <span class="summary-label">Load Area</span>
          <span class="summary-value"><span id="loadArea">—</span> ha</span>
        </div>
        <div class="summary-item accent">
          <span class="summary-label">Load Volume</span>
          <span class="summary-value"><span id="loadVolume">—</span> L</span>
        </div>
        <div class="summary-item accent">
          <span class="summary-label">Total Volume</span>
          <span class="summary-value"><span id="totalVolume">—</span> L</span>
        </div>
        <div class="summary-item accent highlight-box">
          <span class="summary-label">Loads</span>
          <span class="summary-value big" id="loads">—</span>
        </div>
      </div>
    </div>

    <!-- Products/Loads Section -->
    <div id="products"></div>

    <!-- Product Remaining Summary -->
    <div id="stock-summary" class="card"></div>

    <!-- Action Buttons -->
    <div class="button-group centered" id="action-buttons">
      <button class="btn btn-warning" onclick="editJob()">✏️ Edit Job</button>
      <button class="btn btn-danger" onclick="deleteJob()">🗑️ Delete Job</button>
      <button class="btn btn-success" onclick="exportJob()">📤 Export Job</button>
    </div>

    <div class="nav-link">
      <a href="index.html">← Back to Home</a>
    </div>
  </div>

  <script src="job.js"></script>
</body>
</html>
