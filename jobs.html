<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mixer Sheet — Jobs</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Jobs Dashboard</h1>
      <p class="subtitle">Manage & Share Jobs</p>
    </div>

    <!-- Auth Section -->
    <div class="card" id="auth-section">
      <div class="card-title">
        <span class="icon purple">🔐</span>
        Authentication
      </div>

      <div id="auth-buttons" class="button-group">
        <button class="btn btn-primary" onclick="showSignUp()">Sign Up</button>
        <button class="btn btn-secondary" onclick="showSignIn()">Sign In</button>
      </div>

      <div id="user-info" style="display: none;">
        <p class="user-email"></p>
        <button class="btn btn-danger" onclick="logOut()">Log Out</button>
      </div>
    </div>

    <!-- Add Job Section (hidden until logged in) -->
    <div class="card" id="add-job-section" style="display: none;">
      <div class="card-title">
        <span class="icon green">➕</span>
        Add a Job
      </div>

      <form id="job-form">
        <div class="form-grid">
          <div class="form-group">
            <label>Client</label>
            <input type="text" name="client" placeholder="Client name" required>
          </div>
          <div class="form-group">
            <label>Crop</label>
            <input type="text" name="crop" placeholder="Crop type">
          </div>
          <div class="form-group">
            <label>Aircraft</label>
            <input type="text" name="aircraft" placeholder="Aircraft ID">
          </div>
          <div class="form-group">
            <label>Hectares</label>
            <input type="number" name="hectares" step="any" placeholder="Total ha">
          </div>
        </div>

        <div class="checkbox-wrapper" style="margin-top: 15px;">
          <input type="checkbox" id="makePublic" name="public">
          <label for="makePublic">Make Public</label>
        </div>

        <div class="button-group">
          <button type="submit" class="btn btn-success">Save Job</button>
        </div>
      </form>
    </div>

    <!-- Jobs List -->
    <div class="card">
      <div class="card-title">
        <span class="icon orange">📋</span>
        Saved Jobs
      </div>

      <div id="jobs-list" class="jobs-grid">
        <p class="empty-state">Sign in to view and manage jobs</p>
      </div>
    </div>

    <div class="nav-link">
      <a href="index.html">← Back to Home</a>
    </div>
  </div>

  <!-- Auth Modal -->
  <div id="auth-modal" class="modal" style="display: none;">
    <div class="modal-content card">
      <span class="modal-close" onclick="closeModal()">&times;</span>
      <h3 id="modal-title">Sign In</h3>

      <form id="auth-form">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="auth-email" required placeholder="your@email.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="auth-password" required placeholder="Password">
        </div>
        <div class="button-group">
          <button type="submit" class="btn btn-primary" id="auth-submit">Sign In</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    // Firebase config (placeholder - user should replace with their own)
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_PROJECT.firebaseapp.com",
      projectId: "YOUR_PROJECT",
      storageBucket: "YOUR_PROJECT.appspot.com",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    // Initialize Firebase
    try {
      firebase.initializeApp(firebaseConfig);
    } catch (e) {
      console.log('Firebase not configured');
    }

    let isSignUp = false;

    function showSignUp() {
      isSignUp = true;
      document.getElementById('modal-title').textContent = 'Sign Up';
      document.getElementById('auth-submit').textContent = 'Sign Up';
      document.getElementById('auth-modal').style.display = 'flex';
    }

    function showSignIn() {
      isSignUp = false;
      document.getElementById('modal-title').textContent = 'Sign In';
      document.getElementById('auth-submit').textContent = 'Sign In';
      document.getElementById('auth-modal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('auth-modal').style.display = 'none';
    }

    document.getElementById('auth-form').onsubmit = async (e) => {
      e.preventDefault();
      const email = document.getElementById('auth-email').value;
      const password = document.getElementById('auth-password').value;

      try {
        if (isSignUp) {
          await firebase.auth().createUserWithEmailAndPassword(email, password);
        } else {
          await firebase.auth().signInWithEmailAndPassword(email, password);
        }
        closeModal();
      } catch (err) {
        alert('❌ ' + err.message);
      }
    };

    function logOut() {
      firebase.auth().signOut();
    }

    // Auth state listener
    firebase.auth().onAuthStateChanged(user => {
      if (user) {
        document.getElementById('auth-buttons').style.display = 'none';
        document.getElementById('user-info').style.display = 'block';
        document.querySelector('.user-email').textContent = `Logged in as: ${user.email}`;
        document.getElementById('add-job-section').style.display = 'block';
        loadJobs();
      } else {
        document.getElementById('auth-buttons').style.display = 'flex';
        document.getElementById('user-info').style.display = 'none';
        document.getElementById('add-job-section').style.display = 'none';
        document.getElementById('jobs-list').innerHTML = '<p class="empty-state">Sign in to view and manage jobs</p>';
      }
    });

    // Load jobs from Firestore
    async function loadJobs() {
      const db = firebase.firestore();
      const user = firebase.auth().currentUser;
      if (!user) return;

      const snapshot = await db.collection('jobs').where('userId', '==', user.uid).get();
      const jobs = [];
      snapshot.forEach(doc => jobs.push({ id: doc.id, ...doc.data() }));

      const jobsList = document.getElementById('jobs-list');
      if (jobs.length === 0) {
        jobsList.innerHTML = '<p class="empty-state">No jobs yet. Add your first job above!</p>';
      } else {
        jobsList.innerHTML = jobs.map(job => `
          <div class="job-card">
            <div class="job-details">
              <strong>${job.client}</strong>
              <span>${job.crop || 'No crop'} • ${job.hectares || 0} ha</span>
              <span>${job.aircraft || 'No aircraft'}</span>
              ${job.public ? '<span class="badge">Public</span>' : ''}
            </div>
            <div class="job-actions">
              <button class="btn btn-sm btn-primary" onclick="loadJobToMixer('${job.id}')">Load</button>
              <button class="btn btn-sm btn-danger" onclick="deleteCloudJob('${job.id}')">Delete</button>
            </div>
          </div>
        `).join('');
      }
    }

    // Save job to Firestore
    document.getElementById('job-form').onsubmit = async (e) => {
      e.preventDefault();
      const user = firebase.auth().currentUser;
      if (!user) return alert('Please sign in first');

      const data = new FormData(e.target);
      const job = {
        client: data.get('client'),
        crop: data.get('crop'),
        aircraft: data.get('aircraft'),
        hectares: parseFloat(data.get('hectares')) || 0,
        public: data.get('public') === 'on',
        userId: user.uid,
        createdAt: new Date()
      };

      await firebase.firestore().collection('jobs').add(job);
      e.target.reset();
      loadJobs();
      alert('✅ Job saved!');
    };

    async function deleteCloudJob(id) {
      if (!confirm('Delete this job?')) return;
      await firebase.firestore().collection('jobs').doc(id).delete();
      loadJobs();
    }

    async function loadJobToMixer(id) {
      const doc = await firebase.firestore().collection('jobs').doc(id).get();
      const job = doc.data();
      localStorage.setItem('mixerJob', JSON.stringify(job));
      localStorage.setItem('mixerProducts', JSON.stringify([]));
      window.location.href = 'setup.html';
    }
  </script>
</body>
</html>
