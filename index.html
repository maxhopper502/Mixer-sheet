<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Mixer Sheet</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="app-header">
  <h1>✈️ Mixer Sheet</h1>
  <p>Agricultural Spray Job Management</p>
</div>

<div class="container">

  <div class="card" style="margin-top:16px">
    <div class="card-title">🚀 Quick Actions</div>
    <div class="action-grid">
      <a href="setup.html" class="action-card">
        <span class="ac-icon">➕</span>
        <span class="ac-label">New Job</span>
        <span class="ac-desc">Set up a job</span>
      </a>
      <label class="action-card" style="cursor:pointer">
        <span class="ac-icon">📥</span>
        <span class="ac-label">Import</span>
        <span class="ac-desc">Load JSON file</span>
        <input type="file" id="importFile" accept=".json" style="display:none" />
      </label>
      <a href="history.html" class="action-card">
        <span class="ac-icon">📚</span>
        <span class="ac-label">History</span>
        <span class="ac-desc">Completed jobs</span>
      </a>
    </div>
  </div>

  <div class="card">
    <div class="card-title">✈️ Active Jobs</div>
    <div id="active-jobs-wrap">
      <div class="empty-state">
        <div class="es-icon">📋</div>
        <p>No active jobs. Create a new job to get started!</p>
      </div>
    </div>
    <button class="btn btn-ghost btn-sm" onclick="clearAllJobs()" id="clear-btn" style="display:none;margin-top:12px">🗑 Clear All Jobs</button>
  </div>

</div>

<div class="app-footer">Mixer Sheet v3.1 — Multi-Aircraft Edition</div>

<script>
  // ── Helpers ──────────────────────────────────────────────────────────────
  function getAllJobs() {
    const jobs = [];
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      if (!key || !key.startsWith('job_')) continue;
      try {
        const job = JSON.parse(localStorage.getItem(key));
        if (!job || !job.client) continue;                   // skip non-job keys
        const jobId      = job.jobId || key.slice(4);        // backward compat
        const progress   = JSON.parse(localStorage.getItem(`progress_${jobId}`)) || {};
        const currentLoad = progress.currentLoad || 0;
        const done        = currentLoad >= (job.loads || 1);
        jobs.push({ ...job, jobId, currentLoad, done });
      } catch(e) {}
    }
    return jobs.sort((a, b) => a.done - b.done || (a.client || '').localeCompare(b.client || ''));
  }

  function groupJobs(jobs) {
    const groups = {};
    jobs.forEach(j => {
      const key = `${j.client || '—'}_${j.orderNumber || ''}`;
      if (!groups[key]) groups[key] = { label: j.client || '—', order: j.orderNumber, jobs: [] };
      groups[key].jobs.push(j);
    });
    return Object.values(groups);
  }

  // ── Render ───────────────────────────────────────────────────────────────
  function renderJobs() {
    const wrap     = document.getElementById('active-jobs-wrap');
    const clearBtn = document.getElementById('clear-btn');
    const jobs     = getAllJobs();

    if (jobs.length === 0) {
      wrap.innerHTML = `<div class="empty-state"><div class="es-icon">📋</div><p>No active jobs. Create a new job to get started!</p></div>`;
      clearBtn.style.display = 'none';
      return;
    }

    clearBtn.style.display = '';
    const groups = groupJobs(jobs);
    let html = '';

    groups.forEach(group => {
      if (group.jobs.length > 1) {
        html += `<div class="group-label">📋 ${group.label}${group.order ? ' &nbsp;·&nbsp; Order #' + group.order : ''} &nbsp;— ${group.jobs.length} aircraft</div>`;
      }

      group.jobs.forEach(job => {
        const pct = Math.min(100, Math.round((job.currentLoad / (job.loads || 1)) * 100));
        const statusBadge = job.done
          ? `<span class="job-card-badge done">✅ Complete</span>`
          : `<span class="job-card-badge">${job.currentLoad}/${job.loads} loads</span>`;

        html += `
          <div class="job-card">
            <div class="job-card-header">
              <div>
                <div class="job-card-title">✈️ ${job.aircraft || '—'}</div>
                <div class="job-card-sub">${job.client || '—'} · ${job.crop || '—'} · ${job.pilot || '—'}</div>
              </div>
              ${statusBadge}
            </div>
            <div class="job-meta">
              <div class="job-meta-item"><strong>${job.hectares || 0}</strong> ha</div>
              <div class="job-meta-item"><strong>${job.volPerHa || 0}</strong> L/ha</div>
              <div class="job-meta-item"><strong>${job.loads || 0}</strong> loads</div>
              ${job.orderNumber ? `<div class="job-meta-item">Order <strong>#${job.orderNumber}</strong></div>` : ''}
            </div>
            <div class="progress-bar-wrap">
              <div class="progress-bar-fill" style="width:${pct}%"></div>
            </div>
            <div class="progress-label">${job.currentLoad} of ${job.loads} loads complete</div>
            <div class="job-card-actions">
              ${job.done
                ? `<a href="job.html?jobId=${encodeURIComponent(job.jobId)}" class="btn btn-ghost btn-sm">📋 View</a>`
                : `<a href="job.html?jobId=${encodeURIComponent(job.jobId)}" class="btn btn-green btn-sm">▶️ Continue</a>`
              }
              <a href="setup.html?jobId=${encodeURIComponent(job.jobId)}" class="btn btn-ghost btn-sm">✏️ Edit</a>
              <button class="btn btn-orange btn-sm" onclick="addAircraftToJob('${escQ(job.client)}','${escQ(job.orderNumber||'')}')">➕ Add Aircraft</button>
              <button class="btn btn-red btn-sm" onclick="deleteJob('${escQ(job.jobId)}')">🗑</button>
            </div>
          </div>`;
      });
    });

    wrap.innerHTML = html;
  }

  function escQ(s) { return (s||'').replace(/'/g, "\\'"); }

  function addAircraftToJob(client, orderNumber) {
    window.location.href = `setup.html?copyClient=${encodeURIComponent(client)}&copyOrder=${encodeURIComponent(orderNumber)}`;
  }

  function deleteJob(jobId) {
    if (!confirm('Delete this job?')) return;
    localStorage.removeItem(`job_${jobId}`);
    localStorage.removeItem(`products_${jobId}`);
    localStorage.removeItem(`progress_${jobId}`);
    renderJobs();
  }

  function clearAllJobs() {
    if (!confirm('Clear ALL active jobs? This cannot be undone.')) return;
    const keys = [];
    for (let i = 0; i < localStorage.length; i++) keys.push(localStorage.key(i));
    keys.forEach(k => {
      if (k && (k.startsWith('job_') || k.startsWith('products_') || k.startsWith('progress_'))) {
        localStorage.removeItem(k);
      }
    });
    renderJobs();
  }

  // ── Import ────────────────────────────────────────────────────────────────
  document.getElementById('importFile').addEventListener('change', function(evt) {
    const file = evt.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const data     = JSON.parse(e.target.result);
        const job      = data.job || data;
        const prods    = data.products;
        if (!job.client || !job.hectares || !prods) throw 'Invalid file format';
        const jobId    = job.jobId || Date.now().toString();
        job.jobId      = jobId;
        localStorage.setItem(`job_${jobId}`,      JSON.stringify(job));
        localStorage.setItem(`products_${jobId}`, JSON.stringify(prods));
        if (data.progress) localStorage.setItem(`progress_${jobId}`, JSON.stringify(data.progress));
        alert('✅ Job imported!');
        renderJobs();
      } catch(err) {
        alert('❌ Failed to import: ' + err);
      }
    };
    reader.readAsText(file);
    this.value = '';
  });

  renderJobs();
</script>
</body>
</html>
