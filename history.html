<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Completed Jobs</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<div class="app-header">
  <h1>✈️ Mixer Sheet</h1>
  <p>Completed Jobs Archive</p>
</div>

<div class="container">
  <div class="card">
    <div class="card-title">📚 Archived Jobs</div>
    <div id="history-wrap"></div>
  </div>
  <a href="index.html" class="btn btn-ghost btn-block">← Back to Home</a>
</div>

<div class="app-footer">Mixer Sheet v3.0</div>

<script>
  function renderHistory() {
    const wrap   = document.getElementById('history-wrap');
    const jobs   = JSON.parse(localStorage.getItem('completedJobs') || '[]').reverse();
    if (jobs.length === 0) {
      wrap.innerHTML = '<div class="empty-state"><div class="es-icon">📭</div><p>No completed jobs in archive</p></div>';
      return;
    }
    wrap.innerHTML = `<table>
      <thead><tr><th>Client</th><th>Aircraft</th><th>Order #</th><th>Exported</th><th></th></tr></thead>
      <tbody>${jobs.map((j, i) => `
        <tr>
          <td>${j.client || '—'}</td>
          <td>${j.aircraft || '—'}</td>
          <td>${j.orderNumber || '—'}</td>
          <td style="font-size:0.78rem;color:var(--muted)">${j.exportDate || '—'}</td>
          <td><button class="btn btn-red btn-sm" onclick="deleteHistory(${jobs.length-1-i})">🗑</button></td>
        </tr>`).join('')}
      </tbody>
    </table>`;
  }

  function deleteHistory(index) {
    if (!confirm('Remove this entry?')) return;
    const jobs = JSON.parse(localStorage.getItem('completedJobs') || '[]');
    jobs.splice(index, 1);
    localStorage.setItem('completedJobs', JSON.stringify(jobs));
    renderHistory();
  }

  renderHistory();
</script>
</body>
</html>
